title: Suspicious Access to Browser Credential Store
id: 9e1a3c5b-7d2f-4a6c-b8e1-4f5a6b7c8d9e
status: test
description: >
  Detects non-browser processes reading the Chrome/Edge "Login Data" SQLite
  database, which stores encrypted saved passwords.
references:
  - https://attack.mitre.org/techniques/T1555/003/
author: Detection Engineering Team
date: 2026/07/13
tags:
  - attack.credential-access
  - attack.t1555.003
logsource:
  category: file_event
  product: windows
detection:
  selection:
    TargetFilename|contains:
      - '\User Data\Default\Login Data'
      - '\User Data\Default\Cookies'
  filter_browser_itself:
    Image|endswith:
      - '\chrome.exe'
      - '\msedge.exe'
  condition: selection and not filter_browser_itself
falsepositives:
  - Backup software configured to include browser profile directories
  - Browser sync/migration tools
level: high
