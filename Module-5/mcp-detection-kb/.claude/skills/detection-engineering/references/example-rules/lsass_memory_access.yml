# This file is a REFERENCE EXAMPLE for the detection-engineering skill.
# It demonstrates a rule that passes all five required checks in ../../SKILL.md
# (ATT&CK mapping, justified severity, documented false positives, a test-case
# comment, and a lowercase_with_underscores name). Copy the shape, not
# necessarily the exact detection logic, when authoring a new rule under
# rules/.
#
# test-case: samples/sysmon_10_lsass_mimikatz_sekurlsa_logonpasswords.evtx
title: Suspicious Process Access to LSASS Memory
id: 8a1f5e2c-4b3d-4c7a-9e1f-2d3c4b5a6f7e
status: stable
description: >
  Detects processes requesting suspicious access rights to lsass.exe, a common
  precursor to credential dumping (e.g. Mimikatz-style attacks reading
  authentication secrets from process memory). Severity is high: successful
  access grants read access to in-memory credential material with few
  legitimate causes beyond known security tooling, so a match is close to
  actionable on its own.
references:
  - https://attack.mitre.org/techniques/T1003/001/
author: Detection Engineering Team
date: 2026/07/13
tags:
  - attack.credential-access
  - attack.t1003.001
logsource:
  category: process_access
  product: windows
detection:
  selection:
    TargetImage|endswith: '\lsass.exe'
    GrantedAccess:
      - '0x1010'
      - '0x1410'
      - '0x1438'
      - '0x143a'
      - '0x1fffff'
  filter_known_tools:
    SourceImage|endswith:
      - '\MsMpEng.exe'
      - '\WmiPrvSE.exe'
  condition: selection and not filter_known_tools
falsepositives:
  - Windows Defender / MsMpEng.exe and WMI provider host scans (excluded above via filter_known_tools)
  - Other EDR or backup agents with LSASS access exclusions not yet added to filter_known_tools
  - Sysinternals Process Explorer/Procdump run manually by an administrator for legitimate troubleshooting
level: high
