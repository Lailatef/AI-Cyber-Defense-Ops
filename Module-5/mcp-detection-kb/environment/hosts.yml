# Known hosts and their roles in the environment. Used to add context to
# scan_evtx findings and route incident response — e.g. a DCSync alert
# whose source is NOT a domain controller machine account is far more
# suspicious than one that is.
hosts:
  - hostname: DC01
    role: domain_controller
    os: Windows Server 2022
    ip: 10.10.0.10
    criticality: critical
    notes: >
      Primary domain controller, holds all FSMO roles. Legitimate DCSync
      (4662) and NTDS.dit access originates only from the DC01$/DC02$
      machine accounts or the BACKUP-SVC service account.
  - hostname: DC02
    role: domain_controller
    os: Windows Server 2022
    ip: 10.10.0.11
    criticality: critical
    notes: Secondary domain controller, replication partner of DC01.
  - hostname: CA01
    role: certificate_authority
    os: Windows Server 2022
    ip: 10.10.0.20
    criticality: critical
    notes: >
      Enterprise CA (AD CS). High-value NTLM relay target following a
      T1187 forced-authentication coercion — relaying a coerced DC
      machine account to CA01's web enrollment endpoint can yield a
      certificate usable for full domain compromise.
  - hostname: FS01
    role: file_server
    os: Windows Server 2019
    ip: 10.10.0.30
    criticality: high
    notes: >
      Primary file server. Legitimate external SMB destinations are
      limited to the approved Azure Files endpoint — see
      environment/baselines.yml (outbound_smb_destinations).
  - hostname: WEB01
    role: web_server
    os: Windows Server 2022
    ip: 10.10.10.15
    criticality: medium
    notes: >
      Public-facing web application and VPN gateway, DMZ-segmented.
      Internet-facing — expect background brute-force/spray noise
      against any exposed auth endpoint; see environment/baselines.yml
      (failed_logon_thresholds).
  - hostname: "WKS-*"
    role: workstation
    criticality: low
    notes: >
      Standard end-user workstation pool (naming pattern
      WKS-<asset-tag>). No legitimate reason for a workstation to issue
      DCSync requests, access NTDS.dit, or receive an inbound RPC
      coercion call.
