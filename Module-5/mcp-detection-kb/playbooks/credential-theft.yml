title: Credential Theft Response Playbook
id: 1f8a2c3e-6b4d-4a1f-9c2e-7d3b8a4f1c6e
severity: high
techniques:
  - T1003.001
  - T1003.002
  - T1003.003
  - T1003.006
  - T1552.001
  - T1555.003
  - T1556
alert_names:
  - lsass_memory_access
  - Suspicious Process Access to LSASS Memory
  - ntds_dit_access
  - NTDS.dit Access via Volume Shadow Copy or ntdsutil
  - dcsync
  - Active Directory Replication from Non-Machine Account (DCSync)
  - t1003_002
  - Potential SAM Database Dumping via reg.exe save
  - t1003_002_registry_access
  - SAM/SECURITY Registry Hive Access via Object Auditing
  - t1552_001
  - Access to Common Unsecured Credential File Locations
  - browser_credential_theft
  - Suspicious Access to Browser Credential Store
  - t1556
  - LSA Authentication Package or Security Support Provider Registered
summary: >
  Response procedure for suspected credential theft/dumping activity:
  LSASS memory access, SAM/NTDS.dit extraction, DCSync, browser
  credential store access, unsecured credential file access, or rogue
  LSA authentication package registration.
steps:
  - phase: Identification
    actions:
      - Pull the full Hayabusa finding (scan_evtx with output_format="full") for the triggering EventID/RecordID to get the source process, account, and target.
      - Identify which sub-technique fired using detection://rules/{rule_name} or detection://rules/by-technique/{technique_id} for the matched curated rule.
      - Determine scope: is the source host a domain controller (DCSync/NTDS.dit path) or an endpoint (LSASS/SAM/browser store path)?
      - Check for related alerts on the same host/account in the surrounding time window (e.g. a process-creation alert immediately preceding an LSASS-access alert).
  - phase: Containment
    actions:
      - Isolate the source host from the network (EDR network containment or switch port disable) if the activity is confirmed malicious.
      - Disable or force a password reset on any account whose credentials may have been exposed (the logged-on user, and any account targeted by DCSync/NTDS.dit extraction).
      - For DCSync: temporarily restrict Replicating Directory Changes / Replicating Directory Changes All extended rights for the source account if it is not a legitimate DC or sync service.
      - Preserve volatile evidence (memory image, running process list) before killing the offending process, if forensic capability allows.
  - phase: Eradication
    actions:
      - Terminate the offending process and remove any dropped credential-dumping tooling (e.g. Mimikatz, secretsdump.py artifacts, custom LSA SSP DLLs) from disk.
      - If a rogue LSA authentication package/SSP was registered (T1556), remove the registry value under the LSA key and reboot to fully unload it.
      - Rotate credentials for every account confirmed or suspected exposed, including service accounts and the krbtgt account if NTDS.dit/DCSync exposure is confirmed.
  - phase: Recovery
    actions:
      - Re-enable network access for the host only after re-imaging or confirming a clean state.
      - Re-verify DCSync replication rights and SACL auditing configuration on SAM/SECURITY hives are restored to baseline.
      - Monitor the affected account(s) closely for anomalous logons for at least one full authentication cycle (e.g. two Kerberos ticket lifetimes).
  - phase: Lessons Learned
    actions:
      - Confirm whether the triggering curated rule needs tuning (false positive source) via the rule's falsepositives field.
      - If this alert type was previously a coverage gap, consider running suggest_rule on the relevant technique to formalize detection.
      - Update this playbook if the response revealed a step that was missing or ordered incorrectly.
references:
  - https://attack.mitre.org/tactics/TA0006/
  - https://attack.mitre.org/techniques/T1003/
