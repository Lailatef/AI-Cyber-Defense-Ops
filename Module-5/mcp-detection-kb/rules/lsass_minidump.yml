title: LSASS Memory Dump via MiniDump (comsvcs.dll / procdump)
id: 6c2e9a7d-1f4b-4a8e-9c3d-7b5f2e8a4d6c
status: experimental
description: >
  Detects process creation events consistent with dumping lsass.exe memory
  via the MiniDump technique, either through rundll32 invoking comsvcs.dll's
  undocumented MiniDump export, or through Sysinternals ProcDump run against
  lsass.exe. Both are common living-off-the-land alternatives to injecting
  into lsass directly, used to exfiltrate a dump for offline credential
  extraction (e.g. Mimikatz `sekurlsa::minidump`).
  Severity justification: critical — legitimate administration essentially
  never targets lsass.exe with MiniDump/ProcDump specifically (Task Manager
  and the EDR agent read LSASS memory live, they don't write a minidump file
  to disk), so a match has very few plausible benign explanations.
references:
  - https://attack.mitre.org/techniques/T1003/001/
  - https://learn.microsoft.com/en-us/sysinternals/downloads/procdump
author: Detection Engineering Team
date: 2026/07/15
tags:
  - attack.credential-access
  - attack.t1003.001
logsource:
  category: process_creation
  product: windows
detection:
  selection_comsvcs:
    Image|endswith: '\rundll32.exe'
    CommandLine|contains|all:
      - 'comsvcs.dll'
      - 'MiniDump'
  selection_procdump:
    CommandLine|contains|all:
      - 'lsass'
    CommandLine|contains:
      - '-ma'
      - '-mm'
  condition: 1 of selection_*
falsepositives:
  - IT staff manually troubleshooting a *different* process with ProcDump
    whose command line happens to also reference lsass in an unrelated
    argument (rare — CommandLine must contain both 'lsass' and a ProcDump
    dump-type flag)
  - EDR/forensic tooling that legitimately drives ProcDump or comsvcs.dll
    against lsass.exe for authorized memory capture; none currently
    approved in this environment (see environment/baselines.yml
    lsass_access_processes) — if one is onboarded, add it as an explicit
    filter here rather than widening the selection logic
level: critical
# test-case: not yet validated against real EVTX — no MiniDump/comsvcs.dll or ProcDump-against-lsass sample exists in samples/ (the existing Mimikatz sample covers sekurlsa::logonpasswords, a different LSASS-access technique); condition confirmed to load and parse cleanly under Hayabusa -v but not confirmed to fire on true-positive telemetry
