title: Potential Pass-the-Hash Activity via NTLM Logon Anomaly
id: 7f4a1c2d-3e5b-4f6a-8c9d-1a2b3c4d5e6f
status: test
description: >
  Detects NTLM network logons (Logon Type 3) consistent with Pass-the-Hash
  attacks that reuse captured hashes without knowing the plaintext password.
references:
  - https://attack.mitre.org/techniques/T1550/002/
author: Detection Engineering Team
date: 2026/07/13
tags:
  - attack.lateral-movement
  - attack.t1550.002
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4624
    LogonType: 3
    AuthenticationPackageName: 'NTLM'
  filter_anonymous:
    TargetUserName: 'ANONYMOUS LOGON'
  condition: selection and not filter_anonymous
falsepositives:
  - Legacy applications or devices that only support NTLM authentication
  - Cross-domain trusts without Kerberos configured
level: medium
