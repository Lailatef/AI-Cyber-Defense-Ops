title: Potential Brute Force via Failed Logons Against a Single Account
id: 1a7c4e2b-6f3d-4b8a-9e5c-2d7f1a3b6c4e
status: test
description: >
  Detects a single account receiving failed logon attempts (Event ID 4625)
  from more than 10 distinct source IP addresses within a short window,
  consistent with distributed brute-force attacks against one target
  account. Sibling rule brute_force.yml covers the complementary case
  (a single source spraying many accounts) — Sigma only allows one
  aggregation function per condition, so the two directions can't be
  combined with `or` in one rule.
references:
  - https://attack.mitre.org/techniques/T1110/
author: Detection Engineering Team
date: 2026/07/18
tags:
  - attack.credential-access
  - attack.t1110
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4625
  filter_service_accounts:
    TargetUserName|endswith: '$'
  timeframe: 5m
  condition: selection and not filter_service_accounts | count(IpAddress) by TargetUserName > 10
falsepositives:
  - Users mistyping their password repeatedly, especially with cached/mapped drive connections retrying an old credential
  - NAT/VPN gateways or proxies that aggregate many legitimate users behind a single source IP
  - Misconfigured services or scheduled tasks retrying stale credentials
level: high
# test-case: not yet validated against real EVTX — no brute-force/password-spraying sample exists in samples/; condition confirmed to load and parse cleanly under Hayabusa -v (see investigations/2026-07-18_ca-dcsync-4662.md) but not confirmed to fire on true-positive telemetry
